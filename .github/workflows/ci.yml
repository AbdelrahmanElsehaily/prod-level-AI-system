name: CI

# When does this workflow run?
#
# on: pull_request        → every time a PR is opened, updated, or reopened
# branches: [develop, main] → only for PRs targeting these branches
#
# This means a PR from feat/x → develop triggers CI.
# A PR from develop → main also triggers CI (double-check before release).
# A branch push with no PR does NOT trigger this workflow.
on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: unit-tests
  # ---------------------------------------------------------------------------
  # Runs fast, in-memory tests with no external services.
  # If this fails there is no point running the slower integration tests.
  unit-tests:
    name: Unit Tests
    # ubuntu-latest is GitHub's standard Linux runner.
    # It's a fresh VM for every run — no state bleeds between runs.
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the branch that triggered the PR.
      # Without this step the runner has an empty workspace.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install uv — the package manager for this project.
      #
      # Why uv instead of pip?
      #   uv is a Rust-based package manager from Astral (same team as ruff).
      #   It resolves and installs packages 10-100x faster than pip because:
      #     - Dependency resolution runs in Rust (not Python)
      #     - It has a global cache shared across projects and CI runs
      #     - It reads uv.lock (our committed lockfile) directly — no re-solving
      #
      # enable-cache: true → the action caches uv's global package cache in
      # GitHub Actions cache between runs. If uv.lock hasn't changed, the next
      # run restores all packages from cache in ~2 seconds instead of downloading.
      #
      # python-version: reads .python-version automatically when not specified,
      # but we set it explicitly here so the CI job self-documents its requirement.
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      # Step 3: Install all project dependencies from the lockfile.
      #
      # `uv sync` reads uv.lock and installs the EXACT pinned versions —
      # not "resolve and install", just "install what the lockfile says".
      # This is reproducible: CI always gets the same packages as local dev.
      #
      # --all-extras installs both runtime deps AND the [dev] group
      # (pytest, ruff, mypy, etc.) which are needed to run tests.
      #
      # uv also creates and manages the virtual environment automatically —
      # no need to manually activate a venv before running commands.
      - name: Install dependencies
        run: uv sync --all-extras

      # Step 4: Run only the unit tests.
      #
      # `uv run` executes the command inside the project's virtual environment
      # that `uv sync` set up — no need to activate it manually.
      #
      # -v         → verbose: show each test name as it runs
      # --tb=short → on failure, show a compact traceback (not the full wall of text)
      #
      # Unit tests need NO environment variables — all dependencies are mocked.
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: integration-tests
  # ---------------------------------------------------------------------------
  # Runs tests that require REAL Postgres and Redis.
  # The Anthropic API is still mocked — we never make real AI calls in tests.
  #
  # `needs: [unit-tests]` means this job only starts after unit-tests passes.
  # Why gate it? Integration tests spin up Docker services and take longer.
  # If unit tests are already broken, fail fast and save the CI minutes.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]  # Only run if unit tests pass

    # Service containers: GitHub spins these up as Docker containers BEFORE
    # any steps run. They share a Docker network with the runner, so your code
    # reaches them at localhost:<port> — exactly like local dev.
    # GitHub tears them down automatically when the job finishes.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chatapi
        ports:
          # Map container port 5432 → host port 5432 so our code reaches it
          # at postgresql://...@localhost:5432/chatapi
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          # --health-retries 5 means GitHub waits up to 25s for Postgres to be
          # ready before starting the steps. Without this, steps might start
          # while Postgres is still initialising and fail with a connection error.

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    # Environment variables available to ALL steps in this job.
    # These mirror what docker-compose.yml sets for local dev, but point to
    # the service containers above (which are reachable at localhost).
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/chatapi
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      # Run integration tests.
      #
      # The `|| [ $? -eq 5 ]` at the end handles pytest exit code 5, which
      # means "no tests were collected". Right now tests/integration/ has no
      # test files — they are added in Steps 4 and 5. Without this, CI would
      # fail with "no tests found" even though nothing is actually broken.
      #
      # Exit code semantics:
      #   0 → all tests passed           ✅ CI passes
      #   1 → tests ran, some failed     ❌ CI fails (real failure)
      #   2 → interrupted / bad usage    ❌ CI fails
      #   5 → no tests collected         ✅ treated as pass (temporarily)
      #
      # Once real integration tests exist, exit code 5 will never occur
      # and this workaround becomes invisible.
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short || [ $? -eq 5 ]
