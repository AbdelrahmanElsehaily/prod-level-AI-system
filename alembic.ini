# alembic.ini — Alembic database migration configuration
# =========================================================
# Alembic reads this file to know where migration scripts live and how to
# connect to the database. The actual DATABASE_URL is injected at runtime
# via app/config.py — we never hardcode credentials here.
#
# Full Alembic setup (env.py, models, first migration) happens in Step 4.
# This file is committed now so the Dockerfile COPY command doesn't fail.

[alembic]
# Path to the directory containing migration scripts (env.py + versions/)
script_location = migrations

# Logging configuration — uses Python's standard logging.
# We keep this minimal; structlog (configured in app/logging_config.py) handles
# the actual log formatting at runtime.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
